<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret - Guruprasath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    background: radial-gradient(circle at top, #0f0f0f, #000);
    color: white;
}

/* Canvas for particles */
canvas { position: fixed; top:0; left:0; z-index:-1; }

/* Container */
.container {
    text-align: center;
    margin-top: 80px;
}

/* Glowing profile circle */
.profile {
    width: 160px;
    height: 160px;
    margin: auto;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    animation: float 3s ease-in-out infinite;
    cursor: pointer;
}
.profile::before {
    content:"";
    position:absolute; inset:-6px;
    border-radius:50%;
    background: linear-gradient(45deg,#ff00c8,#00f5ff,#ff00c8);
    filter:blur(14px);
    z-index:-1;
    animation: spin 6s linear infinite;
}
.profile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Animations */
@keyframes spin {100%{transform:rotate(360deg);}}
@keyframes float {0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}

h1 { margin-top:20px; font-size:2rem; }

/* Secret message */
#secretMsg {
    color: #ff77c8;
    font-size:1rem;
    margin-top:15px;
    opacity:0;
    transition:1s;
}
#secretMsg.show { opacity:1; }

/* Buttons */
a {
    display:block;
    width:200px;
    margin:12px auto;
    padding:12px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    background: rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    transition:0.3s;
}
a:hover { transform:scale(1.07); background: linear-gradient(45deg,#ff00c8,#00f5ff); box-shadow:0 0 20px rgba(255,0,200,0.6); }

/* Ripple effect */
.ripple { position:fixed; border-radius:50%; background:rgba(255,255,255,0.3); transform:scale(0); animation:ripple 0.6s linear;}
@keyframes ripple { to{ transform: scale(10); opacity:0; } }
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">
    <div class="profile" id="secretProfile">
        <img src="PXL_20251129_172125766.jpg">
    </div>

    <h1>You've found it!</h1>
    <p id="secretMsg">🌌 Only the curious see this…</p>

    <a href="index.html">🏠 Back to Main</a>
</div>

<audio id="secretMusic" loop>
    <source src="Solo X Crack(MP3_320K).mp3" type="audio/mpeg">
</audio>

<script>
// PARTICLES BACKGROUND
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth; canvas.height=innerHeight;
let particles=[];
for(let i=0;i<100;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*2.5,
        speed:Math.random()*0.5
    });
}
function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        p.y+=p.speed;
        if(p.y>canvas.height)p.y=0;
        ctx.fillStyle="white";
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fill();
    });
    requestAnimationFrame(animate);
}
animate();

// RIPPLE EFFECT
document.addEventListener("click", e=>{
    const r=document.createElement("div");
    r.className="ripple";
    r.style.left=e.clientX+"px";
    r.style.top=e.clientY+"px";
    r.style.width=r.style.height="20px";
    document.body.appendChild(r);
    setTimeout(()=>r.remove(),600);
});

// SECRET MESSAGE SHOW
setTimeout(()=>{document.getElementById("I'm actually a cat,meoww 😼").classList.add("show");},2000);

// PLAY SECRET MUSIC
const audio=document.getElementById("secretMusic");
document.getElementById("secretProfile").addEventListener("click", ()=>{
    if(audio.paused) audio.play().catch(()=>{});
});

// FLOAT ANIMATION ON PROFILE CLICK
document.getElementById("secretProfile").addEventListener("mouseenter", ()=>{
    document.getElementById("secretProfile").style.transform="translateY(-10px)";
});
document.getElementById("secretProfile").addEventListener("mouseleave", ()=>{
    document.getElementById("secretProfile").style.transform="translateY(0)";
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guruprasath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #000);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Glass container */
.container {
    text-align: center;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    animation: fadeIn 1.2s ease;
}

/* Profile */
.profile {
    width: 150px;
    height: 150px;
    margin: auto;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    animation: float 3s ease-in-out infinite;
}

/* Glow ring */
.profile::before {
    content: "";
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    background: linear-gradient(45deg, #00f5ff, #ff00c8, #00f5ff);
    filter: blur(12px);
    z-index: -1;
    animation: spin 6s linear infinite;
}

.profile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Animations */
@keyframes spin {
    100% { transform: rotate(360deg); }
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

/* Text */
h1 {
    margin-top: 15px;
    font-size: 2rem;
}

p {
    color: #bbb;
    margin-bottom: 25px;
}

/* Buttons */
a {
    display: block;
    width: 240px;
    margin: 12px auto;
    padding: 14px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.3s;
}

a:hover {
    transform: scale(1.07);
    background: linear-gradient(45deg, #00f5ff, #ff00c8);
    box-shadow: 0 0 20px rgba(255,0,200,0.6);
}
</style>
</head>

<body>

<div class="container">

    <div class="profile">
        <img src="PXL_20251129_172125766.jpg">
    </div>

    <h1>Guruprasath</h1>
    <p>calm outside. storm inside.</p>

    <a href="https://instagram.com/guruprasath2244">📸 Instagram</a>
    <a href="https://wa.me/919344564778">💬 WhatsApp</a>

</div>

</body>
</html>

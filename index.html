<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guruprasath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

/* ===== BODY ===== */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    color: white;
    overflow-x: hidden;
    background: radial-gradient(circle at top, #2b0f14, #000);
    animation: fadeIn 1.5s ease forwards, breathe 8s ease-in-out infinite;
}

@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
@keyframes breathe {
    0%,100% { background-size:100% 100%; }
    50% { background-size:110% 110%; }
}

canvas { position: fixed; top:0; left:0; z-index:-1; }

/* ===== CONTAINER ===== */
.container {
    text-align:center;
    margin:8vh auto;
    width:90%;
    max-width:600px;
}

/* ===== PROFILE ===== */
.profile {
    width:30vw;
    max-width:180px;
    aspect-ratio:1/1;
    margin:auto;
    border-radius:50%;
    overflow:hidden;
    position:relative;
    cursor:pointer;
    animation: float 3s ease-in-out infinite;
}

.profile::before {
    content:"";
    position:absolute;
    inset:-5px;
    border-radius:50%;
    background:linear-gradient(45deg,#ff4d6d,#8a2be2,#ff4d6d);
    filter:blur(12px);
    z-index:-1;
    animation:spin 6s linear infinite;
}

/* heartbeat */
.profile.active::before {
    animation:pulseGlow 0.6s ease;
}

@keyframes pulseGlow {
    0% { transform:scale(1); filter:blur(12px);}
    50% { transform:scale(1.15); filter:blur(20px);}
    100% { transform:scale(1); filter:blur(12px);}
}

.profile img { width:100%; height:100%; object-fit:cover; }

@keyframes spin {100%{transform:rotate(360deg);}}
@keyframes float {0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}

/* ===== TEXT ===== */
h1 {
    margin-top:15px;
    font-size:5vw;
    border-right:2px solid white;
    width:fit-content;
    margin:auto;
    white-space:nowrap;
    overflow:hidden;
}

#intro { font-size:3.5vw; color:#ccc; min-height:20px; }

.status {
    color:#ff4d6d;
    font-size:3vw;
    animation:pulse 2s infinite;
}
@keyframes pulse {0%{opacity:0.4;}50%{opacity:1;}100%{opacity:0.4;}}

.bio { color:#bbb; margin-bottom:20px; }

/* ===== TAGS ===== */
.things span {
    display:inline-block;
    padding:6px 14px;
    margin:5px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    cursor:pointer;
    transition:0.3s;
}
.things span:hover {
    background:linear-gradient(45deg,#ff4d6d,#8a2be2);
    transform:scale(1.05);
}

/* ===== MUSIC ===== */
.music-controls {
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:10px;
}

.music-controls button {
    background:rgba(255,255,255,0.08);
    border:none;
    padding:10px;
    color:white;
    border-radius:10px;
    cursor:pointer;
}
.music-controls button:hover {
    background:linear-gradient(45deg,#ff4d6d,#8a2be2);
}

#progressContainer {
    width:80%;
    margin:10px auto;
    height:5px;
    background:rgba(255,255,255,0.2);
}
#progress {
    height:100%;
    width:0%;
    background:#ff4d6d;
}

/* ===== LINKS ===== */
a {
    display:block;
    width:80%;
    margin:12px auto;
    padding:14px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    background:rgba(255,255,255,0.08);
}
a:hover {
    transform:scale(1.07);
    background:linear-gradient(45deg,#ff4d6d,#8a2be2);
}

/* ripple */
.ripple {
    position:fixed;
    border-radius:50%;
    background:rgba(255,255,255,0.3);
    transform:scale(0);
    animation:ripple 0.6s linear;
}
@keyframes ripple { to{ transform:scale(10); opacity:0; } }

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<div class="profile" id="profile">
<img src="PXL_20251129_172125766.jpg">
</div>

<h1 id="name"></h1>
<p id="intro"></p>
<p class="status">● present</p>

<p class="bio">calm outside. storm inside.</p>

<div class="things">
<span>🏸 Badminton</span>
<span>🎧 Music</span>
<span>🌙 Night thinker</span>
<span>🎬 Stories</span>
</div>

<p id="nowPlaying"></p>

<div class="music-controls">
<button id="prevBtn">⏮️</button>
<button id="playPauseBtn">▶️</button>
<button id="nextBtn">⏭️</button>
<input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
</div>

<div id="progressContainer">
<div id="progress"></div>
</div>

<a href="https://instagram.com/guruprasath2244">📸 Instagram</a>
<a href="https://wa.me/919344564778">💬 WhatsApp</a>

</div>

<audio id="music"></audio>

<script>

/* typing */
let name="Guruprasath",i=0;
function type(){if(i<name.length){document.getElementById("name").innerHTML+=name[i++];setTimeout(type,100);}} type();

let intro="Not always loud. But always real.",j=0;
function introType(){if(j<intro.length){document.getElementById("intro").innerHTML+=intro[j++];setTimeout(introType,40);}}
setTimeout(introType,1200);

/* particles */
const canvas=document.getElementById("bg"),ctx=canvas.getContext("2d");
canvas.width=innerWidth; canvas.height=innerHeight;
let p=[];
for(let i=0;i<80;i++){p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,s:Math.random()*2});}
function anim(){
ctx.clearRect(0,0,canvas.width,canvas.height);
p.forEach(e=>{e.y+=0.5;if(e.y>canvas.height)e.y=0;
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(e.x,e.y,e.s,0,Math.PI*2);
ctx.fill();});
requestAnimationFrame(anim);}
anim();

/* AUDIO */
const audio=document.getElementById("music");
const playPauseBtn=document.getElementById("playPauseBtn");
const nextBtn=document.getElementById("nextBtn");
const prevBtn=document.getElementById("prevBtn");
const volumeSlider=document.getElementById("volumeSlider");
const progress=document.getElementById("progress");
const progressContainer=document.getElementById("progressContainer");
const nowPlaying=document.getElementById("nowPlaying");

const songs = [
{name:"Apocalypse", file:"Apocalypse(MP3_320K).mp3"},
{name:"Starlight", file:"Starlight(MP3_320K).mp3"},
{name:"Night Changes", file:"Night Changes(MP3_320K).mp3"},
{name:"Until I Found You", file:"Until I Found You (Em Beihold Version)(MP3_320K).mp3"},
{name:"Stranger Flame", file:"Stranger's  flame re edit.mp3"},
{name:"Love is a Laserquest", file:"Love is a Laserquest(MP3_320K).mp3"},
{name:"To Build a Home", file:"To Build A Home(MP3_320K).mp3"},
{name:"Someone You Loved", file:"Someone You Loved(MP3_320K).mp3"},
{name:"Motion Picture Soundtrack", file:"Motion Picture Soundtrack(MP3_320K).mp3"},
{name:"Intro", file:"Intro(MP3_320K).mp3"}
];

let current=0;

/* play song */
function playSong(index){
audio.src=songs[index].file;
nowPlaying.innerText="🎧 "+songs[index].name;
audio.volume=volumeSlider.value;
audio.play();
playPauseBtn.innerText="⏸️";
}

/* controls */
playPauseBtn.onclick=()=>{
if(audio.paused){audio.play(); playPauseBtn.innerText="⏸️";}
else{audio.pause(); playPauseBtn.innerText="▶️";}
};

nextBtn.onclick=()=>{current=(current+1)%songs.length;playSong(current);};
prevBtn.onclick=()=>{current=(current-1+songs.length)%songs.length;playSong(current);};

volumeSlider.oninput=()=>audio.volume=volumeSlider.value;

audio.ontimeupdate=()=>{
progress.style.width=(audio.currentTime/audio.duration)*100+"%";
};

progressContainer.onclick=e=>{
const rect=progressContainer.getBoundingClientRect();
audio.currentTime=(e.clientX-rect.left)/rect.width*audio.duration;
};

audio.onended=()=>nextBtn.onclick();

/* START ONLY ON FIRST CLICK */
let started=false;
document.addEventListener("click",()=>{
if(!started){
playSong(current);
started=true;
}
});

/* PROFILE EFFECT */
const profile=document.getElementById("profile");

profile.onclick=()=>{
profile.classList.add("active");
setTimeout(()=>profile.classList.remove("active"),600);

/* ripple from center */
const ripple=document.createElement("div");
ripple.className="ripple";
ripple.style.left=innerWidth/2+"px";
ripple.style.top=innerHeight/2+"px";
document.body.appendChild(ripple);
setTimeout(()=>ripple.remove(),600);
};

</script>

</body>
</html>

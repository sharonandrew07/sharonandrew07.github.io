<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guruprasath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    color: white;
    background: radial-gradient(circle at top, #1a1a2e, #000);
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* Container */
.container {
    text-align: center;
    margin-top: 60px;
}

/* Profile */
.profile {
    width: 150px;
    height: 150px;
    margin: auto;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    animation: float 3s ease-in-out infinite;
    cursor: pointer;
}

.profile::before {
    content: "";
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    background: linear-gradient(45deg, #00f5ff, #ff00c8, #00f5ff);
    filter: blur(12px);
    z-index: -1;
    animation: spin 6s linear infinite;
}

.profile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Animations */
@keyframes spin {
    100% { transform: rotate(360deg); }
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* Name */
h1 {
    margin-top: 15px;
    font-size: 2rem;
    border-right: 2px solid white;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
    white-space: nowrap;
    overflow: hidden;
}

/* Intro */
#intro {
    font-size: 0.95rem;
    color: #ccc;
    margin-top: 5px;
    min-height: 20px;
}

/* Status */
.status {
    font-size: 0.8rem;
    color: #00ff9d;
    margin-bottom: 15px;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { opacity: 0.4; }
    50% { opacity: 1; }
    100% { opacity: 0.4; }
}

/* Bio */
.bio {
    color: #bbb;
    margin-bottom: 20px;
}

/* Things */
.things {
    margin-bottom: 25px;
}

.things span {
    display: inline-block;
    padding: 6px 12px;
    margin: 5px;
    border-radius: 20px;
    font-size: 0.8rem;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.3s;
}

.things span:hover {
    background: linear-gradient(45deg, #00f5ff, #ff00c8);
    transform: scale(1.05);
}

/* Buttons */
a {
    display: block;
    width: 240px;
    margin: 12px auto;
    padding: 14px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.3s;
}

a:hover {
    transform: scale(1.07);
    background: linear-gradient(45deg, #00f5ff, #ff00c8);
    box-shadow: 0 0 20px rgba(255,0,200,0.6);
}

/* Ripple */
.ripple {
    position: fixed;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transform: scale(0);
    animation: ripple 0.6s linear;
    pointer-events: none;
}

@keyframes ripple {
    to {
        transform: scale(10);
        opacity: 0;
    }
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

    <div class="profile" id="secretTrigger">
        <img src="PXL_20251129_172125766.jpg">
    </div>

    <h1 id="name"></h1>
    <p id="intro"></p>
    <p class="status">● online</p>

    <p class="bio">calm outside. storm inside.</p>

    <div class="things">
        <span>🎧 music</span>
        <span>🏸 badminton</span>
        <span>🌙 night thinker</span>
        <span>🎬 stories</span>
    </div>

    <a href="https://instagram.com/guruprasath2244">📸 Instagram</a>
    <a href="https://wa.me/919344564778?text=Hey%20I%20just%20saw%20your%20site%20🔥">
        💬 WhatsApp
    </a>

</div>

<audio id="music" loop>
    <source src="Solo Crack(MP3_320K).mp3" type="audio/mpeg">
</audio>

<script>
/* Intro typing */
const introText = "Not always loud. But always real.";
let j = 0;
function typeIntro() {
    if (j < introText.length) {
        document.getElementById("intro").innerHTML += introText.charAt(j);
        j++;
        setTimeout(typeIntro, 40);
    }
}
setTimeout(typeIntro, 1200);

/* Name typing */
const text = "Guruprasath";
let i = 0;
function type() {
    if (i < text.length) {
        document.getElementById("name").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 100);
    }
}
type();

/* Particles */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speed: Math.random() * 0.6
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
        p.y += p.speed;
        if (p.y > canvas.height) p.y = 0;
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });
    requestAnimationFrame(animate);
}
animate();

/* Ripple + music */
document.addEventListener("click", function(e) {
    const ripple = document.createElement("div");
    ripple.className = "ripple";
    ripple.style.left = e.clientX + "px";
    ripple.style.top = e.clientY + "px";
    ripple.style.width = ripple.style.height = "20px";
    document.body.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);

    document.getElementById("music").play().catch(()=>{});
});

/* Secret trigger */
let taps = 0;
document.getElementById("secretTrigger").addEventListener("click", () => {
    taps++;
    if (taps === 5) {
        window.location.href = "secret.html";
    }
});
</script>

</body>
</html>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.container {

}

/* Profile */
.profile {

    height: 140px;
    margin: auto;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 0 25px rgba(255,0,200,0.6);

.profile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Text */
h1 {
    margin-top: 15px;
    font-size: 2rem;
}

p {
    color: #aaa;
    margin-bottom: 25px;
}

/* Buttons */
a {
    display: block;
    width: 240px;

    padding: 14px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    background: #222;
    transition: 0.3s;
}

a:hover {
    background: linear-gradient(45deg, #00f5ff, #ff00c8);
    transform: scale(1.05);
}

</head>

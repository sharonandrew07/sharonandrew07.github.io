<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guruprasath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    color: white;
    background: radial-gradient(circle at top, #1a1a2e, #000);
}
canvas { position: fixed; top:0; left:0; z-index:-1; }

.container { text-align:center; margin-top:60px; }

/* Profile */
.profile {
    width:150px; height:150px; margin:auto; border-radius:50%; overflow:hidden; position:relative;
    animation: float 3s ease-in-out infinite; cursor:pointer;
}
.profile::before {
    content:""; position:absolute; inset:-5px; border-radius:50%;
    background:linear-gradient(45deg,#00f5ff,#ff00c8,#00f5ff); filter:blur(12px); z-index:-1; animation:spin 6s linear infinite;
}
.profile img { width:100%; height:100%; object-fit:cover; }

@keyframes spin { 100% { transform: rotate(360deg); } }
@keyframes float { 0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);} }

h1 { margin-top:15px; font-size:2rem; border-right:2px solid white; width:fit-content; margin-left:auto;margin-right:auto; white-space:nowrap; overflow:hidden; }

#intro { font-size:0.95rem; color:#ccc; margin-top:5px; min-height:20px; }
.status { font-size:0.8rem; color:#00ff9d; margin-bottom:15px; animation:pulse 2s infinite; }
@keyframes pulse {0%{opacity:0.4;}50%{opacity:1;}100%{opacity:0.4;}}

.bio { color:#bbb; margin-bottom:20px; }
.things span { display:inline-block; padding:6px 12px; margin:5px; border-radius:20px; font-size:0.8rem; background: rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.1);}
.things span:hover { background:linear-gradient(45deg,#00f5ff,#ff00c8); transform:scale(1.05); }

#nowPlaying { font-size:0.8rem; color:#888; }
#timeMsg { font-size:0.9rem; color:#ccc; }
#hiddenMsg { opacity:0; transition:1s; color:#ff77c8; }
#hiddenMsg.show { opacity:1; }

a { display:block; width:240px; margin:12px auto; padding:14px; border-radius:12px; text-decoration:none; color:white; background: rgba(255,255,255,0.08);}
a:hover { transform:scale(1.07); background:linear-gradient(45deg,#00f5ff,#ff00c8); box-shadow:0 0 20px rgba(255,0,200,0.6); }

.ripple { position:fixed; border-radius:50%; background:rgba(255,255,255,0.3); transform:scale(0); animation:ripple 0.6s linear;}
@keyframes ripple { to{ transform: scale(10); opacity:0; } }

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<div class="profile" id="secretTrigger">
    <img src="PXL_20251129_172125766.jpg">
</div>

<h1 id="name"></h1>
<p id="intro"></p>
<p class="status">● online</p>

<p class="bio">calm outside. storm inside.</p>

<div class="things">
    <span>🎧 music</span>
    <span>🏸 badminton</span>
    <span>🌙 night thinker</span>
    <span>🎬 stories</span>
</div>

<p id="nowPlaying"></p>
<p id="timeMsg"></p>
<p id="hiddenMsg">Not everyone notices… but you did.</p>

<a href="https://instagram.com/guruprasath2244">📸 Instagram</a>
<a href="https://wa.me/919344564778">💬 WhatsApp</a>

</div>

<audio id="music" loop></audio>

<script>
/* NAME & INTRO TYPING */
let name="Guruprasath",i=0;
function type(){if(i<name.length){document.getElementById("name").innerHTML+=name[i++];setTimeout(type,100);}} type();
let intro="Not always loud. But always real.", j=0;
function introType(){if(j<intro.length){document.getElementById("intro").innerHTML+=intro[j++]; setTimeout(introType,40);}}
setTimeout(introType,1200);

/* TIME MESSAGE & HIDDEN MESSAGE */
const hour=new Date().getHours();
document.getElementById("timeMsg").innerText=
    hour<12?"Starting slow…":hour<18?"In the middle of something.":hour<22?"Evenings feel different.":"Late nights. Real thoughts.";
setTimeout(()=>{document.getElementById("hiddenMsg").classList.add("show");},6000);

/* BIO MOOD SWITCH */
const moods=["calm outside. storm inside.","silent… but not empty.","feels everything. says nothing.","not lost. just thinking deeper."];
setInterval(()=>{document.querySelector(".bio").innerText=moods[Math.floor(Math.random()*moods.length)];},5000);

/* PARTICLES */
const canvas=document.getElementById("bg"),ctx=canvas.getContext("2d");
canvas.width=innerWidth; canvas.height=innerHeight;
let p=[]; for(let i=0;i<80;i++){p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,s:Math.random()*2});}
function anim(){ctx.clearRect(0,0,canvas.width,canvas.height); p.forEach(e=>{e.y+=0.5;if(e.y>canvas.height)e.y=0;ctx.fillStyle="white";ctx.beginPath();ctx.arc(e.x,e.y,e.s,0,Math.PI*2);ctx.fill();}); requestAnimationFrame(anim);} anim();

/* RIPPLE */
document.addEventListener("click",e=>{const r=document.createElement("div");r.className="ripple";r.style.left=e.clientX+"px";r.style.top=e.clientY+"px";r.style.width=r.style.height="20px";document.body.appendChild(r); setTimeout(()=>r.remove(),600);});

/* SECRET */
let taps=0; document.getElementById("secretTrigger").onclick=()=>{taps++; if(taps==5) location.href="secret.html";};

/* 🔥 NEXT-LEVEL AUDIO WITH 10 SONGS - PLAY FULL SONGS */
const songs = [
  name:"Apocalypse", file:"Apocalypse(MP3_320K).mp3"},
    {name:"Starlight", file:"Starlight(MP3_320K).mp3"},
    {name:"Night Changes", file:"Night Changes(MP3_320K).mp3"},
    {name:"Until I Found You", file:"Until I Found You (Em Beihold Version)(MP3_320K).mp3"},
    {name:"Stranger Flame", file:"Stranger's  flame re edit.mp3"},
    {name:"Love is a Laserquest", file:"Love is a Laserquest(MP3_320K).mp3"},
    {name:"To Build a Home", file:"To Build A Home(MP3_320K).mp3"},
    {name:"Someone You Loved", file:"Someone You Loved(MP3_320K).mp3"},
    {name:"Motion Picture Soundtrack", file:"Motion Picture Soundtrack(MP3_320K).mp3"},
    {name:"Intro", file:"Intro(MP3_320K).mp3"}
];

const audio = document.getElementById("music");
const nowPlaying = document.getElementById("nowPlaying");

let current = Math.floor(Math.random() * songs.length);

function playSong(index){
    const song = songs[index];
    audio.src = song.file;
    nowPlaying.innerText = "🎧 " + song.name;
    audio.volume = 0;
    audio.play().catch(()=>{});
    fadeIn(audio,0.02);
}

/* Fade In/Out */
function fadeIn(a, step){ let vol=a.volume; const f=setInterval(()=>{vol+=step;if(vol>=1){vol=1;clearInterval(f);} a.volume=vol;},50);}
function fadeOut(a, step, cb){ let vol=a.volume; const f=setInterval(()=>{vol-=step;if(vol<=0){vol=0;clearInterval(f); if(cb)cb();} a.volume=vol;},50);}

playSong(current);

/* NEXT SONG AFTER FULL PLAY */
audio.addEventListener("ended", ()=>{
    current = (current+1) % songs.length;
    playSong(current);
});

/* START MUSIC ON FIRST CLICK */
document.addEventListener("click",()=>{
    audio.play().catch(()=>{});
});
</script>

</body>
</html>

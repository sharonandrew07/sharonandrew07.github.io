<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guruprasath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    color:white;
    background:radial-gradient(circle at top,#1a1a2e,#000);
    overflow-x:hidden;
    user-select:none;
}
canvas{position:fixed;top:0;left:0;z-index:-1}

.container{text-align:center;margin-top:8vh}

/* PROFILE */
.profile{
    width:140px;height:140px;margin:auto;border-radius:50%;
    overflow:hidden;position:relative;cursor:pointer;
    animation:float 3s ease-in-out infinite;
}
.profile::before{
    content:"";position:absolute;inset:-5px;border-radius:50%;
    background:linear-gradient(45deg,#00f5ff,#ff00c8,#00f5ff);
    filter:blur(12px);z-index:-1;animation:spin 6s linear infinite;
}
.profile img{width:100%;height:100%;object-fit:cover}

@keyframes spin{100%{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* TEXT */
h1{margin-top:15px;font-size:2rem;border-right:2px solid white;width:fit-content;margin:auto;white-space:nowrap;overflow:hidden}
#intro{font-size:0.9rem;color:#ccc}
.status{color:#00ff9d;font-size:0.8rem;margin-bottom:10px}

.bio{color:#bbb;margin-bottom:15px}

/* TAGS */
.things span{
    display:inline-block;padding:6px 12px;margin:5px;border-radius:20px;
    font-size:0.8rem;background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    cursor:pointer;transition:0.3s;
}
.things span:hover{
    background:linear-gradient(45deg,#00f5ff,#ff00c8);
    transform:scale(1.1);
}

/* MUSIC */
.music-controls{
    display:flex;justify-content:center;gap:10px;margin-top:10px;
}
.music-controls button{
    background:rgba(255,255,255,0.08);
    border:none;color:white;padding:8px 12px;border-radius:8px;
}
#progressContainer{width:80%;margin:10px auto;height:5px;background:#333;border-radius:5px}
#progress{height:100%;width:0;background:linear-gradient(45deg,#00f5ff,#ff00c8)}

a{
    display:block;margin:12px auto;padding:12px;width:200px;
    border-radius:10px;color:white;text-decoration:none;
    background:rgba(255,255,255,0.08);
}
a:hover{background:linear-gradient(45deg,#00f5ff,#ff00c8)}

/* RIPPLE */
.ripple{
    position:fixed;border-radius:50%;
    background:rgba(255,255,255,0.3);
    transform:scale(0);
    animation:ripple 0.6s linear;
}
@keyframes ripple{to{transform:scale(8);opacity:0}}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<div class="profile" id="secretTrigger">
<img src="PXL_20251129_172125766.jpg">
</div>

<h1 id="name"></h1>
<p id="intro"></p>
<p class="status">● online</p>

<p class="bio">calm outside. storm inside.</p>

<div class="things">
<span>🏸 Badminton</span>
<span>🎧 Music</span>
<span>🌙 Night thinker</span>
<span>🎬 Stories</span>
</div>

<p id="nowPlaying"></p>

<div class="music-controls">
<button id="prev">⏮️</button>
<button id="play">▶️</button>
<button id="next">⏭️</button>
<input type="range" id="vol" min="0" max="1" step="0.01" value="0.5">
</div>

<div id="progressContainer"><div id="progress"></div></div>

<p id="timeMsg"></p>
<p id="hiddenMsg" style="opacity:0;transition:1s;color:#ff77c8">Not everyone notices… but you did.</p>

<a href="https://instagram.com/guruprasath2244">📸 Instagram</a>
<a id="waLink">💬 WhatsApp</a>

</div>

<audio id="audio"></audio>

<script>

/* ===== NAME ===== */
let n="Guruprasath",i=0;
(function t(){if(i<n.length){name.innerHTML+=n[i++];setTimeout(t,100)}})();

/* ===== INTRO ===== */
let txt="Not always loud. But always real.",j=0;
setTimeout(()=>{(function t(){if(j<txt.length){intro.innerHTML+=txt[j++];setTimeout(t,40)}})()},1000);

/* ===== TIME MSG ===== */
let h=new Date().getHours();
timeMsg.innerText=h<12?"Starting slow…":h<18?"In the middle of something.":"Late nights hit different";

/* ===== HIDDEN ===== */
setTimeout(()=>hiddenMsg.style.opacity=1,5000);

/* ===== PARTICLES ===== */
let c=bg.getContext("2d");
bg.width=innerWidth;bg.height=innerHeight;
let pts=[...Array(60)].map(()=>({x:Math.random()*bg.width,y:Math.random()*bg.height}));
(function anim(){
c.clearRect(0,0,bg.width,bg.height);
pts.forEach(p=>{p.y+=0.5;if(p.y>bg.height)p.y=0;c.fillRect(p.x,p.y,2,2)});
requestAnimationFrame(anim);
})();

/* ===== RIPPLE ===== */
document.addEventListener("click",e=>{
let r=document.createElement("div");
r.className="ripple";
r.style.left=e.clientX+"px";
r.style.top=e.clientY+"px";
r.style.width=r.style.height="20px";
document.body.appendChild(r);
setTimeout(()=>r.remove(),600);
});

/* ===== SECRET TAP ===== */
let taps=0;
secretTrigger.onclick=()=>{
taps++;
if(taps===5) location.href="secret.html";
};

/* ===== MUSIC ===== */
const songs=[
"Apocalypse(MP3_320K).mp3",
"Starlight(MP3_320K).mp3",
"Night Changes(MP3_320K).mp3"
];

let cur=0;
const audio=document.getElementById("audio");

function playSong(i){
audio.src=songs[i];
audio.volume=vol.value;
audio.play();
nowPlaying.innerText="🎧 "+songs[i];
play.innerText="⏸️";
}

play.onclick=()=>{
if(audio.paused){audio.play();play.innerText="⏸️";}
else{audio.pause();play.innerText="▶️";}
};

next.onclick=()=>{cur=(cur+1)%songs.length;playSong(cur);}
prev.onclick=()=>{cur=(cur-1+songs.length)%songs.length;playSong(cur);}

vol.oninput=()=>audio.volume=vol.value;

audio.ontimeupdate=()=>{
progress.style.width=(audio.currentTime/audio.duration)*100+"%";
};

progressContainer.onclick=e=>{
let rect=progressContainer.getBoundingClientRect();
audio.currentTime=((e.clientX-rect.left)/rect.width)*audio.duration;
};

audio.onended=()=>next.onclick();

/* autoplay first click */
let started=false;
document.addEventListener("click",()=>{
if(!started){playSong(cur);started=true;}
},{once:true});

/* ===== SMART WHATSAPP ===== */
const params=new URLSearchParams(location.search);
let mode=params.get("mode");

let msg;

if(mode==="nfc"){
msg=h<18?
"Just tapped your card… that was clean 😄":
"Tapped your card at night… feels different 🌙";
}else{
msg="Hey, came across your page 👀";
}

waLink.href="https://wa.me/919344564778?text="+encodeURIComponent(msg);

</script>

</body>
</html>

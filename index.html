<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guruprasath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

* {
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    color: white;
    background: radial-gradient(circle at top, #1a1a2e, #000);
    overflow-x: hidden;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* CONTAINER */
.container {
    text-align: center;
    margin: 8vh auto;
    width: 90%;
    max-width: 600px;
}

/* PROFILE */
.profile {
    width: 140px;
    height: 140px;
    margin: auto;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    animation: float 3s infinite ease-in-out;
}

.profile::before {
    content:"";
    position:absolute;
    inset:-5px;
    border-radius:50%;
    background:linear-gradient(45deg,#00f5ff,#ff00c8,#00f5ff);
    filter:blur(12px);
    z-index:-1;
    animation: spin 6s linear infinite;
}

.profile img {
    width:100%;
    height:100%;
    object-fit:cover;
}

@keyframes spin {100%{transform:rotate(360deg);}}
@keyframes float {50%{transform:translateY(-10px);}}

/* TEXT */
h1 {
    margin-top:15px;
    font-size:28px;
    border-right:2px solid white;
    white-space:nowrap;
    overflow:hidden;
    width: fit-content;
    margin-left:auto;
    margin-right:auto;
}

.status {
    color:#00ff9d;
    animation:pulse 2s infinite;
}

@keyframes pulse {
    50%{opacity:0.4;}
}

.bio {
    color:#bbb;
    margin-bottom:20px;
}

/* TAGS */
.things span {
    display:inline-block;
    padding:8px 14px;
    margin:6px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    cursor:pointer;
    transition:0.3s;
}

.things span:active {
    transform:scale(1.2);
    background:linear-gradient(45deg,#00f5ff,#ff00c8);
}

/* POPUP */
.popup {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(0,0,0,0.8);
    padding: 12px 20px;
    border-radius: 20px;
    font-size: 14px;
    opacity: 0;
    transition: 0.4s;
}

.popup.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
}

/* MUSIC */
.music-controls button {
    margin:5px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.1);
    color:white;
}

#progressContainer {
    width:80%;
    margin:10px auto;
    height:5px;
    background:rgba(255,255,255,0.2);
}

#progress {
    height:100%;
    width:0%;
    background:linear-gradient(45deg,#00f5ff,#ff00c8);
}

/* LINKS */
a {
    display:block;
    margin:10px auto;
    width:200px;
    padding:12px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    background:rgba(255,255,255,0.08);
}

/* RIPPLE */
.ripple {
    position: fixed;
    border-radius:50%;
    background:rgba(255,255,255,0.3);
    transform:scale(0);
    animation:ripple 0.6s linear;
}

@keyframes ripple {
    to { transform:scale(10); opacity:0; }
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<div class="profile" id="secretTrigger">
<img src="PXL_20251129_172125766.jpg">
</div>

<h1 id="name"></h1>
<p class="status">● online</p>

<p class="bio">calm outside. storm inside.</p>

<div class="things">
<span onclick="showPopup('badminton')">🏸 badminton</span>
<span onclick="showPopup('music')">🎧 music</span>
<span onclick="showPopup('thoughts')">🌙 thoughts</span>
<span onclick="showPopup('stories')">🎬 stories</span>
</div>

<p id="nowPlaying"></p>

<div class="music-controls">
<button id="prevBtn">⏮</button>
<button id="playPauseBtn">▶</button>
<button id="nextBtn">⏭</button>
</div>

<div id="progressContainer"><div id="progress"></div></div>

<a href="https://instagram.com/guruprasath2244">Instagram</a>
<a href="https://wa.me/919344564778">WhatsApp</a>

</div>

<div id="popup" class="popup"></div>

<audio id="music"></audio>

<script>

/* TYPE */
let text="Guruprasath",i=0;
function type(){ if(i<text.length){ document.getElementById("name").innerHTML+=text[i++]; setTimeout(type,100);}}
type();

/* PARTICLES */
const c=document.getElementById("bg");
const ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;
let p=[];
for(let i=0;i<80;i++){p.push({x:Math.random()*c.width,y:Math.random()*c.height,s:Math.random()*2});}
function anim(){
ctx.clearRect(0,0,c.width,c.height);
p.forEach(e=>{
e.y+=0.5;if(e.y>c.height)e.y=0;
ctx.beginPath();ctx.arc(e.x,e.y,e.s,0,6.28);ctx.fillStyle="white";ctx.fill();
});
requestAnimationFrame(anim);
}
anim();

/* RIPPLE */
document.addEventListener("click",e=>{
let r=document.createElement("div");
r.className="ripple";
r.style.left=e.clientX+"px";
r.style.top=e.clientY+"px";
r.style.width=r.style.height="20px";
document.body.appendChild(r);
setTimeout(()=>r.remove(),600);
});

/* SECRET */
let taps=0;
document.getElementById("secretTrigger").onclick=()=>{
taps++; if(taps===5) location.href="secret.html";
};

/* MUSIC */
const songs=[
{name:"Apocalypse",file:"Apocalypse.mp3"},
{name:"Starlight",file:"Starlight.mp3"},
{name:"Night Changes",file:"Night.mp3"}
];

let audio=document.getElementById("music");
let now=document.getElementById("nowPlaying");
let current=0;

function playSong(i){
audio.src=songs[i].file;
now.innerText="🎧 "+songs[i].name;
audio.play();
playPauseBtn.innerText="⏸";
}
playSong(current);

playPauseBtn.onclick=()=>{audio.paused?(audio.play(),playPauseBtn.innerText="⏸"):(audio.pause(),playPauseBtn.innerText="▶");};
nextBtn.onclick=()=>{current=(current+1)%songs.length;playSong(current);};
prevBtn.onclick=()=>{current=(current-1+songs.length)%songs.length;playSong(current);};

audio.ontimeupdate=()=>{
progress.style.width=(audio.currentTime/audio.duration)*100+"%";
};

/* POPUP SYSTEM */
const popup=document.getElementById("popup");

function showPopup(type){

let textMap={
badminton:"It’s the only place my mind goes silent.",
music:"Some songs understand me better than people.",
thoughts:"I smile outside… there’s a lot more inside.",
stories:"One day, I’ll tell everything. Not now."
};

popup.innerText=textMap[type];
popup.classList.add("show");

setTimeout(()=>popup.classList.remove("show"),2500);

/* SPECIAL: MUSIC TAP CHANGES SONG */
if(type==="music"){
current=(current+1)%songs.length;
playSong(current);
}

}

</script>

</body>
</html>

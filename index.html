<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guruprasath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0f0f0f, #000);   
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Fade animation */
.container {
    text-align: center;
    animation: fadeIn 1.5s ease;
}

/* Profile image */
img {
    width: 130px;
    border-radius: 50%;
    margin-bottom: 15px;
    box-shadow: 0 0 25px rgba(255,255,255,0.15);
    transition: 0.4s;
}

img:hover {
    transform: scale(1.05);
}

/* Name */
h1 {
    font-size: 2.3rem;
    margin: 10px 0;
}

/* Bio */
p {
    color: #aaa;
    margin-bottom: 25px;
}

/* Buttons */
a {
    display: block;
    width: 230px;
    margin: 10px auto;
    padding: 14px;
    background: linear-gradient(45deg, #1a1a1a, #2a2a2a);
    color: white;
    text-decoration: none;
    border-radius: 12px;
    transition: 0.3s;
}

/* Hover effect */
a:hover {
    transform: scale(1.06);
    background: linear-gradient(45deg, #2a2a2a, #3a3a3a);
}

/* Animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
    <img src="https://drive.google.com/file/d/13bKVdchrKv1jrDUe6-2eJ72qFl_Agvs5/view?usp=drivesdk">

    <h1>Guruprasath</h1>
    <p>calm outside.storm inside.</p>

    <a href="https://instagram.com/guruprasath2244">Instagram</a>
    <a href="https://wa.me/91XXXXXXXXXX">WhatsApp</a>
</div>

</body>
</html>

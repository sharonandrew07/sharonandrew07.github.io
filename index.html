<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guruprasath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0f0f0f, #000);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.container {
    text-align: center;
    animation: fadeIn 1.5s ease;
}

/* Glowing profile circle */
.profile {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    padding: 4px;
    background: linear-gradient(45deg, #00f5ff, #ff00c8, #00f5ff);
    margin: auto;
    animation: glow 4s linear infinite;
}

/* Image inside */
.profile img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
}

/* Glow animation */
@keyframes glow {
    0% { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(360deg); }
}

/* Floating effect */
.profile {
    animation: float 3s ease-in-out infinite, glow 6s linear infinite;
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

/* Name */
h1 {
    font-size: 2.3rem;
    margin: 15px 0 5px;
}

/* Bio */
p {
    color: #aaa;
    margin-bottom: 25px;
}

/* Buttons */
a {
    display: block;
    width: 240px;
    margin: 12px auto;
    padding: 14px;
    background: linear-gradient(45deg, #1a1a1a, #2a2a2a);
    color: white;
    text-decoration: none;
    border-radius: 12px;
    transition: 0.3s;
}

/* Hover effect */
a:hover {
    transform: scale(1.08);
    background: linear-gradient(45deg, #2a2a2a, #3a3a3a);
}

/* Fade animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">

    <div class="profile">
        <img src="PXL_20251129_172125766.jpg" alt="Profile">
    </div>

    <h1>Guruprasath</h1>
    <p>calm outside. storm inside.</p>

    <a href="https://instagram.com/guruprasath2244">📸 Instagram</a>
    <a href="https://wa.me/919344564778">💬 WhatsApp</a>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guruprasath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
*{user-select:none;-webkit-tap-highlight-color:transparent;}

body{
margin:0;
font-family:'Poppins',sans-serif;
color:white;
background:radial-gradient(circle at top,#1a1a2e,#000);
overflow-x:hidden;
}

canvas{position:fixed;top:0;left:0;z-index:-1;}

.container{text-align:center;margin:8vh auto;width:90%;max-width:600px;}

.profile{
width:140px;height:140px;margin:auto;border-radius:50%;
overflow:hidden;position:relative;cursor:pointer;
animation:float 3s infinite ease-in-out;
}
.profile::before{
content:"";position:absolute;inset:-5px;border-radius:50%;
background:linear-gradient(45deg,#00f5ff,#ff00c8,#00f5ff);
filter:blur(12px);z-index:-1;animation:spin 6s linear infinite;
}
.profile img{width:100%;height:100%;object-fit:cover;}

@keyframes spin{100%{transform:rotate(360deg);}}
@keyframes float{50%{transform:translateY(-10px);}}

h1{
margin-top:15px;font-size:28px;border-right:2px solid white;
white-space:nowrap;overflow:hidden;width:fit-content;margin:auto;
}

.status{color:#00ff9d;animation:pulse 2s infinite;}
@keyframes pulse{50%{opacity:0.4;}}

.bio{color:#bbb;margin-bottom:20px;}

.things span{
display:inline-block;padding:8px 14px;margin:6px;border-radius:20px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.1);
cursor:pointer;transition:0.3s;
}
.things span:active{
transform:scale(1.2);
background:linear-gradient(45deg,#00f5ff,#ff00c8);
}

.popup{
position:fixed;bottom:30px;left:50%;
transform:translateX(-50%) translateY(100px);
background:rgba(0,0,0,0.8);
padding:12px 20px;border-radius:20px;
opacity:0;transition:0.4s;
}
.popup.show{
transform:translateX(-50%) translateY(0);
opacity:1;
}

.music-controls button{
margin:5px;padding:10px;border:none;border-radius:10px;
background:rgba(255,255,255,0.1);color:white;cursor:pointer;
}

#progressContainer{
width:80%;margin:10px auto;height:5px;
background:rgba(255,255,255,0.2);
}
#progress{
height:100%;width:0%;
background:linear-gradient(45deg,#00f5ff,#ff00c8);
}

a{
display:block;margin:10px auto;width:200px;padding:12px;
border-radius:10px;text-decoration:none;color:white;
background:rgba(255,255,255,0.08);
}

.ripple{
position:fixed;border-radius:50%;
background:rgba(255,255,255,0.3);
transform:scale(0);animation:ripple 0.6s linear;
}
@keyframes ripple{to{transform:scale(10);opacity:0;}}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<div class="profile" id="secretTrigger">
<img src="PXL_20251129_172125766.jpg">
</div>

<h1 id="name"></h1>
<p class="status">● online</p>

<p class="bio">calm outside. storm inside.</p>

<div class="things">
<span onclick="showPopup('badminton')">🏸 badminton</span>
<span onclick="showPopup('music')">🎧 music</span>
<span onclick="showPopup('thoughts')">🌙 thoughts</span>
<span onclick="showPopup('stories')">🎬 stories</span>
</div>

<p id="nowPlaying"></p>

<div class="music-controls">
<button id="prevBtn">⏮</button>
<button id="playPauseBtn">▶</button>
<button id="nextBtn">⏭</button>
</div>

<div id="progressContainer"><div id="progress"></div></div>

<a href="https://instagram.com/guruprasath2244">Instagram</a>
<a href="https://wa.me/919344564778">WhatsApp</a>

</div>

<div id="popup" class="popup"></div>

<audio id="music"></audio>

<script>

/* TYPE */
let text="Guruprasath",i=0;
(function type(){if(i<text.length){document.getElementById("name").innerHTML+=text[i++];setTimeout(type,100);}})();

/* PARTICLES */
const c=document.getElementById("bg"),ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;
let p=[];for(let i=0;i<80;i++){p.push({x:Math.random()*c.width,y:Math.random()*c.height,s:Math.random()*2});}
(function anim(){
ctx.clearRect(0,0,c.width,c.height);
p.forEach(e=>{e.y+=0.5;if(e.y>c.height)e.y=0;ctx.beginPath();ctx.arc(e.x,e.y,e.s,0,6.28);ctx.fillStyle="white";ctx.fill();});
requestAnimationFrame(anim);
})();

/* MUSIC */
const songs=[
{name:"Apocalypse",file:"Apocalypse(MP3_320K).mp3"},
{name:"Starlight",file:"Starlight(MP3_320K).mp3"},
{name:"Night Changes",file:"Night Changes(MP3_320K).mp3"},
{name:"Until I Found You",file:"Until I Found You (Em Beihold Version)(MP3_320K).mp3"},
{name:"Stranger Flame",file:"Stranger's  flame re edit.mp3"},
{name:"Love is a Laserquest",file:"Love is a Laserquest(MP3_320K).mp3"},
{name:"To Build a Home",file:"To Build A Home(MP3_320K).mp3"},
{name:"Someone You Loved",file:"Someone You Loved(MP3_320K).mp3"},
{name:"Motion Picture Soundtrack",file:"Motion Picture Soundtrack(MP3_320K).mp3"},
{name:"Intro",file:"Intro(MP3_320K).mp3"}
];

const audio=document.getElementById("music");
const nowPlaying=document.getElementById("nowPlaying");
const playPauseBtn=document.getElementById("playPauseBtn");
const nextBtn=document.getElementById("nextBtn");
const prevBtn=document.getElementById("prevBtn");
const progress=document.getElementById("progress");

let current=Math.floor(Math.random()*songs.length);
let started=false;

/* FADE */
function fadeOut(cb){
let v=audio.volume;
let f=setInterval(()=>{
v-=0.05;
if(v<=0){clearInterval(f);if(cb)cb();}
audio.volume=v;
},50);
}
function fadeIn(){
let v=0;
audio.volume=0;
let f=setInterval(()=>{
v+=0.05;
if(v>=1){clearInterval(f);}
audio.volume=v;
},50);
}

function playSong(i){
fadeOut(()=>{
audio.src=songs[i].file;
nowPlaying.innerText="🎧 "+songs[i].name;
audio.play().catch(()=>{});
fadeIn();
});
}

/* CONTROLS */
playPauseBtn.onclick=()=>{
if(audio.paused){audio.play();playPauseBtn.innerText="⏸";}
else{audio.pause();playPauseBtn.innerText="▶";}
};

nextBtn.onclick=()=>{current=(current+1)%songs.length;playSong(current);};
prevBtn.onclick=()=>{current=(current-1+songs.length)%songs.length;playSong(current);};

audio.ontimeupdate=()=>{
if(audio.duration){
progress.style.width=(audio.currentTime/audio.duration)*100+"%";
}
};

audio.onended=()=>{
current=(current+1)%songs.length;
playSong(current);
};

/* RIPPLE + FIRST TAP */
document.addEventListener("click",e=>{
let r=document.createElement("div");
r.className="ripple";
r.style.left=e.clientX+"px";
r.style.top=e.clientY+"px";
r.style.width=r.style.height="20px";
document.body.appendChild(r);
setTimeout(()=>r.remove(),600);

if(!started){
playSong(current);
started=true;
}
});

/* SECRET FIX */
let taps=0;
const profile=document.getElementById("secretTrigger");

profile.addEventListener("click",(e)=>{
e.stopPropagation(); // 🔥 FIX
taps++;
if(taps===5){
window.location.href="secret.html";
}
});

/* POPUP */
const popup=document.getElementById("popup");

function showPopup(type){
const map={
badminton:"It’s the only place my mind goes silent.",
music:"Some songs understand me better than people.",
thoughts:"I smile outside… there’s more inside.",
stories:"One day, I’ll tell everything."
};

popup.innerText=map[type];
popup.classList.add("show");
setTimeout(()=>popup.classList.remove("show"),2500);

if(type==="music"){
current=(current+1)%songs.length;
playSong(current);
}
}

</script>

</body>
</html>
